<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collaboration in Line Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-container">
      <h1 class="login-title">Collaboration in Line</h1>
      <p class="login-subtitle">Simulation</p>
      <div class="login-form">
        <input type="text" id="full-name" placeholder="Full Name" autocomplete="name" />
        <input type="email" id="email" placeholder="Email" autocomplete="email" />
        <button id="enter-btn">Enter Installation</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden">

    <!-- TOP BAR -->
    <header id="top-bar">
      <div class="top-left">
        <span class="app-title">Collaboration in Line</span>
        <span id="user-label" class="user-label"></span>
      </div>
      <div class="top-center">
        <div class="tool-group">
          <button class="tool-btn" data-tool="select" title="Select & Edit">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
            <span>Select</span>
          </button>
          <button class="tool-btn" data-tool="line" title="Place LED Strip">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20 C8 10, 16 10, 20 20"/><circle cx="4" cy="20" r="2" fill="currentColor"/><circle cx="20" cy="20" r="2" fill="currentColor"/></svg>
            <span>LED Strip</span>
          </button>
          <button class="tool-btn" data-tool="small-frame" title="Place Small Frame (8&quot;x8&quot;)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
            <span>Small Frame</span>
          </button>
          <button class="tool-btn" data-tool="large-frame" title="Place Large Frame (2'x2')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
            <span>Large Frame</span>
          </button>
          <button class="tool-btn" data-tool="delete" title="Delete Element">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>
            <span>Delete</span>
          </button>
        </div>
      </div>
      <div class="top-right">
        <button id="notifications-toggle" class="notif-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span id="notif-badge" class="notif-badge hidden">!</span>
        </button>
      </div>
    </header>

    <!-- CANVAS AREA -->
    <div id="canvas-container">
      <canvas id="grid-canvas"></canvas>
      <div id="tooltip" class="tooltip hidden"></div>

      <!-- Line placement status -->
      <div id="line-status" class="placement-status hidden">
        <span id="line-remaining">20.0 ft remaining</span>
        <button id="commit-line-btn" class="commit-btn">Place Line</button>
        <button id="cancel-line-btn" class="cancel-btn">Cancel</button>
      </div>

      <!-- Frame placement status -->
      <div id="frame-status" class="placement-status hidden">
        <span id="frame-info">Small Frame (8"&times;8")</span>
        <button id="commit-frame-btn" class="commit-btn">Place Frame</button>
        <button id="cancel-frame-btn" class="cancel-btn">Cancel</button>
      </div>

      <!-- Toast notification -->
      <div id="toast" class="toast hidden">
        <span id="toast-message"></span>
      </div>
    </div>

    <!-- NOTIFICATIONS PANEL -->
    <aside id="notifications-panel" class="panel hidden">
      <div class="panel-header">
        <h3>Notifications</h3>
        <button id="close-notifications" class="close-btn">&times;</button>
      </div>
      <div id="notifications-list" class="panel-body"></div>
    </aside>

    <!-- TIMELINE -->
    <div id="timeline-bar">
      <div id="timeline-label">Timeline</div>
      <div id="timeline-track">
        <button class="timeline-tab active" data-snapshot="current">Current</button>
      </div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
